<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأخبار – المعهد الصحي العالي واسط</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .news-card { cursor: pointer; transition: transform .2s, box-shadow .2s; }
    .news-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }

    /* Modal */
    #newsModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:3000; align-items:center; justify-content:center; padding:1rem; }
    #newsModal.open { display:flex; }
    .modal-box { background:#fff; border-radius:10px; max-width:780px; width:100%; max-height:92vh; overflow-y:auto; position:relative; }
    .modal-close { position:sticky; top:0; display:flex; justify-content:flex-end; padding:.75rem 1rem .25rem; background:#fff; z-index:1; }
    .modal-close button { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--gray); line-height:1; }
    .modal-body { padding:0 2rem 2rem; }

    /* Gallery */
    .gallery-main { width:100%; max-height:420px; object-fit:contain; border-radius:8px; background:#f3f4f6; display:block; margin-bottom:.75rem; }
    .gallery-thumbs { display:flex; gap:.5rem; flex-wrap:wrap; }
    .gallery-thumb { width:72px; height:54px; object-fit:cover; border-radius:5px; cursor:pointer; border:2px solid transparent; transition:border-color .15s; }
    .gallery-thumb.active { border-color:var(--teal); }
    .gallery-thumb:hover { border-color:var(--teal); }
  </style>
</head>
<body class="rtl">
<header id="site-header"></header>

<section class="page-hero"><div class="container"><h1 id="ph_title"></h1><p id="ph_sub"></p></div></section>

<section class="section">
  <div class="container">
    <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2rem;align-items:center">
      <select id="catFilter" class="form-control" style="max-width:220px" onchange="renderNews()">
        <option value="">جميع التصنيفات</option>
        <option value="منشآت">منشآت</option>
        <option value="فعاليات">فعاليات</option>
        <option value="أكاديمي">أكاديمي</option>
        <option value="شراكات">شراكات</option>
        <option value="تدريب">تدريب</option>
        <option value="عام">عام</option>
      </select>
      <input type="text" id="searchBox" class="form-control" style="max-width:280px" placeholder="بحث في الأخبار..." oninput="renderNews()">
    </div>

    <div id="loadingNews" style="text-align:center;padding:3rem;color:var(--gray)">
      <i class="fas fa-spinner fa-spin fa-2x"></i><p style="margin-top:1rem">جارٍ تحميل الأخبار...</p>
    </div>
    <div id="errorNews" style="display:none;text-align:center;padding:3rem;color:#c62828">
      <i class="fas fa-exclamation-circle fa-2x"></i><p style="margin-top:1rem" id="errorMsg"></p>
    </div>
    <div id="newsGrid" class="news-grid" style="display:none"></div>
    <div id="emptyNews" style="display:none;text-align:center;padding:3rem;color:var(--gray)">
      <i class="fas fa-newspaper fa-2x"></i><p style="margin-top:1rem">لا توجد أخبار تطابق بحثك.</p>
    </div>
  </div>
</section>

<!-- NEWS MODAL -->
<div id="newsModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-close"><button onclick="closeModal()"><i class="fas fa-times"></i></button></div>
    <div class="modal-body">
      <span class="news-category" id="m_cat" style="margin-bottom:.75rem;display:inline-block"></span>
      <h2 id="m_title" style="font-size:1.5rem;color:var(--navy);margin:.5rem 0 .75rem;line-height:1.35"></h2>
      <div style="display:flex;gap:1.2rem;flex-wrap:wrap;font-size:.85rem;color:var(--gray);margin-bottom:1.5rem">
        <span><i class="fas fa-calendar-alt" style="color:var(--teal);margin-left:.35rem"></i><span id="m_date"></span></span>
        <span><i class="fas fa-user" style="color:var(--teal);margin-left:.35rem"></i><span id="m_author"></span></span>
      </div>

      <!-- Gallery -->
      <div id="m_gallery" style="display:none;margin-bottom:1.5rem">
        <img id="m_main_img" class="gallery-main" src="" alt="">
        <div class="gallery-thumbs" id="m_thumbs"></div>
      </div>

      <p id="m_body" style="color:var(--gray-dark);line-height:1.9;font-size:1rem;white-space:pre-wrap"></p>
    </div>
  </div>
</div>

<footer id="site-footer"></footer>
<script src="js/app.js"></script><script src="js/layout.js"></script>
<script>
const catLabels = {'منشآت':'منشآت','فعاليات':'فعاليات','أكاديمي':'أكاديمي','شراكات':'شراكات','تدريب':'تدريب','عام':'عام'};
let _allNews = [];

async function loadNews() {
  try {
    _allNews = await HHI.getNews();
    document.getElementById('loadingNews').style.display = 'none';
    document.getElementById('newsGrid').style.display = 'grid';
    renderNews();
  } catch(e) {
    document.getElementById('loadingNews').style.display = 'none';
    document.getElementById('errorNews').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'تعذّر تحميل الأخبار. تحقق من الاتصال بالإنترنت.';
  }
}

function getImages(n) {
  let imgs = [];
  if (n.images && Array.isArray(n.images) && n.images.length) imgs = n.images;
  else if (n.image) imgs = [n.image];
  return imgs;
}

function renderNews() {
  const cat = document.getElementById('catFilter').value;
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  let list = _allNews.filter(n => {
    if (cat && n.category !== cat) return false;
    if (q && !n.title.toLowerCase().includes(q) && !n.body.toLowerCase().includes(q)) return false;
    return true;
  });
  const grid = document.getElementById('newsGrid');
  const empty = document.getElementById('emptyNews');
  if (!list.length) { grid.innerHTML = ''; grid.style.display='none'; empty.style.display='block'; return; }
  empty.style.display = 'none'; grid.style.display = 'grid';
  grid.innerHTML = list.map(n => {
    const imgs = getImages(n);
    const thumb = imgs[0] || '';
    const extraCount = imgs.length > 1 ? imgs.length - 1 : 0;
    return `
    <article class="news-card" onclick="openModal(${n.id})">
      ${thumb ? `
        <div class="news-img" style="background-image:url('${escHtml(thumb)}');position:relative">
          ${extraCount > 0 ? `<span style="position:absolute;bottom:.5rem;left:.5rem;background:rgba(0,0,0,.6);color:#fff;font-size:.75rem;padding:.2rem .55rem;border-radius:99px"><i class="fas fa-images" style="margin-left:.3rem"></i>+${extraCount}</span>` : ''}
        </div>` : ''}
      <div class="news-body">
        <span class="news-category">${escHtml(catLabels[n.category]||n.category)}</span>
        <h3 class="news-title">${escHtml(n.title)}</h3>
        <p class="news-excerpt">${escHtml(n.body.length>180 ? n.body.substring(0,180)+'…' : n.body)}</p>
        <div class="news-meta">
          <span><i class="fas fa-calendar-alt"></i> ${formatDate(n.date)}</span>
          <span><i class="fas fa-user"></i> ${escHtml(n.author||'الإدارة')}</span>
          ${imgs.length > 1 ? `<span style="margin-right:auto;color:var(--teal)"><i class="fas fa-images"></i> ${imgs.length} صور</span>` : ''}
        </div>
      </div>
    </article>`;
  }).join('');
}

function openModal(id) {
  const n = _allNews.find(x => x.id === id); if (!n) return;
  const imgs = getImages(n);

  document.getElementById('m_cat').textContent = catLabels[n.category] || n.category;
  document.getElementById('m_title').textContent = n.title;
  document.getElementById('m_date').textContent = formatDate(n.date);
  document.getElementById('m_author').textContent = n.author || 'الإدارة';
  document.getElementById('m_body').textContent = n.body;

  const gallery = document.getElementById('m_gallery');
  if (imgs.length) {
    gallery.style.display = 'block';
    const mainImg = document.getElementById('m_main_img');
    mainImg.src = imgs[0];
    const thumbsEl = document.getElementById('m_thumbs');
    if (imgs.length > 1) {
      thumbsEl.innerHTML = imgs.map((src, i) =>
        `<img src="${escHtml(src)}" class="gallery-thumb ${i===0?'active':''}" onclick="switchImg(this,'${escHtml(src)}')" alt="">`
      ).join('');
    } else {
      thumbsEl.innerHTML = '';
    }
  } else {
    gallery.style.display = 'none';
  }

  const modal = document.getElementById('newsModal');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function switchImg(thumb, src) {
  document.getElementById('m_main_img').src = src;
  document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
}

function closeModal() {
  document.getElementById('newsModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function renderPage() {
  renderHeader('news.html'); renderFooter();
  document.getElementById('ph_title').textContent = 'الأخبار والإعلانات';
  document.getElementById('ph_sub').textContent = 'ابقَ على اطلاع بآخر مستجدات معهد الصحة العالي  / واسط';
  document.body.classList.add('rtl');
  document.documentElement.dir = 'rtl';
  document.documentElement.lang = 'ar';
  document.title = 'الأخبار – المعهد الصحي العالي واسط';
}
renderPage();
loadNews();
</script>
</body>
</html>
