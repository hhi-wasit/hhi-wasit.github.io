<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رسائل التخرج – المعهد الصحي العالي واسط</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="rtl">
<header id="site-header"></header>
<div class="page-header">
  <h1 id="ph_t"></h1><p id="ph_s"></p>
  <div class="breadcrumb"><a href="index.html" id="bc_home"></a><span>/</span><span id="bc_cur"></span></div>
</div>
<section class="section">
  <div class="container">
    <div class="alert alert-info" id="notice_txt"></div>
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="ابحث بالعنوان أو المؤلف أو المشرف...">
      <select id="deptFilter">
        <option value="">كل الأقسام</option>
        <option value="nursing">التمريض</option>
        <option value="emergency">الطوارئ</option>
        <option value="midwifery">القبالة</option>
        <option value="anesthesia">التخدير</option>
      </select>
      <select id="yearFilter">
        <option value="">كل السنوات</option>
        <option value="2025">2025</option><option value="2024">2024</option><option value="2023">2023</option>
      </select>
      <select id="sortBy">
        <option value="year-desc">الأحدث أولاً</option>
        <option value="year-asc">الأقدم أولاً</option>
        <option value="alpha">أبجدي</option>
      </select>
    </div>

    <!-- Stats -->
    <div style="display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:2rem">
      <div style="text-align:center;padding:1rem 1.5rem;background:var(--teal-pale);border-radius:var(--radius);min-width:110px">
        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--navy)" id="totalCount">—</div>
        <div style="font-size:.8rem;color:var(--gray)">إجمالي الرسائل</div>
      </div>
      <div style="text-align:center;padding:1rem 1.5rem;background:#e3f2fd;border-radius:var(--radius);min-width:110px">
        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:#1565c0" id="nursingCount">—</div>
        <div style="font-size:.8rem;color:#1565c0">التمريض</div>
      </div>
      <div style="text-align:center;padding:1rem 1.5rem;background:#fce4ec;border-radius:var(--radius);min-width:110px">
        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:#c62828" id="emergencyCount">—</div>
        <div style="font-size:.8rem;color:#c62828">الطوارئ</div>
      </div>
      <div style="text-align:center;padding:1rem 1.5rem;background:#f3e5f5;border-radius:var(--radius);min-width:110px">
        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:#6a1b9a" id="midwiferyCount">—</div>
        <div style="font-size:.8rem;color:#6a1b9a">القبالة</div>
      </div>
      <div style="text-align:center;padding:1rem 1.5rem;background:#e8f5e9;border-radius:var(--radius);min-width:110px">
        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:#2e7d32" id="anesthesiaCount">—</div>
        <div style="font-size:.8rem;color:#2e7d32">التخدير</div>
      </div>
    </div>

    <div id="loadingTheses" style="text-align:center;padding:3rem;color:var(--gray)">
      <i class="fas fa-spinner fa-spin fa-2x"></i><p style="margin-top:1rem">جارٍ تحميل رسائل التخرج...</p>
    </div>
    <div id="thesesCount" style="color:var(--gray);font-size:.9rem;margin-bottom:1rem;display:none"></div>
    <div id="thesesList"></div>
    <div id="noResults" style="display:none;text-align:center;padding:3rem;color:var(--gray)">
      <i class="fas fa-search" style="font-size:2rem;margin-bottom:1rem;display:block;opacity:.4"></i>
      <span>لا توجد رسائل مطابقة لبحثك.</span>
    </div>
  </div>
</section>

<!-- Modal -->
<div id="thesisModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:8px;max-width:660px;width:100%;max-height:90vh;overflow-y:auto;padding:2.5rem;position:relative">
    <button onclick="closeModal()" style="position:absolute;top:1rem;left:1rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray)"><i class="fas fa-times"></i></button>
    <div id="modalContent"></div>
  </div>
</div>

<footer id="site-footer"></footer>
<script src="js/app.js"></script><script src="js/layout.js"></script>
<script>
const DL = {nursing:'التمريض',emergency:'الطوارئ',midwifery:'القبالة',anesthesia:'التخدير'};
let _allTheses = [];

async function loadTheses() {
  try {
    _allTheses = await HHI.getTheses();
    document.getElementById('loadingTheses').style.display = 'none';
    document.getElementById('thesesCount').style.display = 'block';
    updateStats();
    render();
  } catch(e) {
    document.getElementById('loadingTheses').innerHTML =
      '<i class="fas fa-exclamation-circle fa-2x" style="color:#c62828"></i><p style="margin-top:1rem;color:#c62828">تعذّر تحميل رسائل التخرج. تحقق من الاتصال بالإنترنت.</p>';
  }
}

function updateStats() {
  document.getElementById('totalCount').textContent = _allTheses.length;
  document.getElementById('nursingCount').textContent = _allTheses.filter(x=>x.department==='nursing').length;
  document.getElementById('emergencyCount').textContent = _allTheses.filter(x=>x.department==='emergency').length;
  document.getElementById('midwiferyCount').textContent = _allTheses.filter(x=>x.department==='midwifery').length;
  document.getElementById('anesthesiaCount').textContent = _allTheses.filter(x=>x.department==='anesthesia').length;
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const dept = document.getElementById('deptFilter').value;
  const yr = document.getElementById('yearFilter').value;
  const sort = document.getElementById('sortBy').value;
  let list = _allTheses.filter(tt => {
    if (dept && tt.department !== dept) return false;
    if (yr && String(tt.year) !== yr) return false;
    if (q && !tt.title.toLowerCase().includes(q) && !tt.author.toLowerCase().includes(q) && !(tt.supervisor||'').toLowerCase().includes(q)) return false;
    return true;
  });
  if (sort==='year-desc') list.sort((a,b)=>b.year-a.year);
  else if (sort==='year-asc') list.sort((a,b)=>a.year-b.year);
  else list.sort((a,b)=>a.title.localeCompare(b.title,'ar'));
  document.getElementById('thesesCount').textContent = 'يعرض ' + list.length + ' رسالة';
  const container = document.getElementById('thesesList');
  const none = document.getElementById('noResults');
  if (!list.length) { container.innerHTML = ''; none.style.display = 'block'; return; }
  none.style.display = 'none';
  container.innerHTML = list.map(tt => `
    <div class="thesis-item">
      <div class="thesis-meta">
        <span class="thesis-tag ${tt.department}">${DL[tt.department]||tt.department}</span>
        <span class="thesis-year">${tt.year}</span>
        <span style="font-size:.78rem;color:var(--gray);margin-right:auto"><i class="fas fa-calendar" style="margin-left:.3rem"></i>${formatDate(tt.uploaded||tt.created_at)}</span>
      </div>
      <h4>${escHtml(tt.title)}</h4>
      <div class="thesis-author" style="margin-bottom:.4rem">
        <i class="fas fa-user" style="margin-left:.4rem;color:var(--teal)"></i><strong>${escHtml(tt.author)}</strong>
        | المشرف: ${escHtml(tt.supervisor||'—')}
      </div>
      <p style="font-size:.88rem;color:var(--gray);margin:.5rem 0 0;line-height:1.7">${escHtml((tt.abstract||'').substring(0,180))}…</p>
      <div style="display:flex;gap:1rem;margin-top:.9rem;flex-wrap:wrap">
        <a href="#" class="thesis-download" onclick="openThesis(${tt.id});return false"><i class="fas fa-eye"></i> عرض التفاصيل</a>
        ${tt.file_url
          ? `<a href="${escHtml(tt.file_url)}" target="_blank" class="thesis-download" style="color:var(--accent)"><i class="fas fa-download"></i> تنزيل PDF (${escHtml(tt.filesize||'')})</a>`
          : `<span class="thesis-download" style="color:#9ca3af;cursor:default"><i class="fas fa-lock"></i> الملف غير متاح</span>`}
      </div>
    </div>`).join('');
}

function openThesis(id) {
  const tt = _allTheses.find(x=>x.id===id); if(!tt) return;
  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap">
      <span class="thesis-tag ${tt.department}">${DL[tt.department]||tt.department}</span>
      <span class="thesis-year">${tt.year}</span>
    </div>
    <h2 style="border:none;font-size:1.5rem;margin-bottom:1.2rem;line-height:1.3">${escHtml(tt.title)}</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;background:var(--gray-light);padding:1.2rem;border-radius:var(--radius);margin-bottom:1.5rem;font-size:.9rem">
      <div><strong>الباحث:</strong> ${escHtml(tt.author)}</div>
      <div><strong>السنة:</strong> ${tt.year}</div>
      <div><strong>المشرف:</strong> ${escHtml(tt.supervisor||'—')}</div>
      <div><strong>القسم:</strong> ${DL[tt.department]||tt.department}</div>
      ${tt.filename ? `<div><strong>الملف:</strong> ${escHtml(tt.filename)}</div>` : ''}
      ${tt.filesize ? `<div><strong>الحجم:</strong> ${escHtml(tt.filesize)}</div>` : ''}
    </div>
    <h4>الملخص</h4>
    <p style="color:var(--gray-dark);line-height:1.8">${escHtml(tt.abstract||'')}</p>
    <div style="margin-top:1.5rem">
      ${tt.file_url
        ? `<a href="${escHtml(tt.file_url)}" target="_blank" class="btn btn-primary"><i class="fas fa-download" style="margin-left:.5rem"></i>تنزيل PDF</a>`
        : `<span class="btn btn-primary" style="opacity:.5;cursor:not-allowed"><i class="fas fa-lock" style="margin-left:.5rem"></i>الملف غير متاح</span>`}
    </div>`;
  document.getElementById('thesisModal').style.display = 'flex';
}
function closeModal() { document.getElementById('thesisModal').style.display = 'none'; }
document.getElementById('thesisModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
['searchInput','deptFilter','yearFilter','sortBy'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('change', render);
  if (id==='searchInput') el.addEventListener('input', render);
});

function renderPage() {
  renderHeader('theses.html'); renderFooter();
  document.getElementById('ph_t').textContent = 'أرشيف رسائل التخرج';
  document.getElementById('ph_s').textContent = 'بحوث الطلاب الخريجين من معهد الصحة العالي  / واسط';
  document.getElementById('bc_home').textContent = 'الرئيسية';
  document.getElementById('bc_cur').textContent = 'رسائل التخرج';
  document.getElementById('notice_txt').innerHTML = 'يحتوي هذا الأرشيف على رسائل التخرج للطلاب. لرفع رسائل جديدة، يُرجى استخدام <a href="admin.html"><strong>بوابة الإدارة</strong></a>.';
  document.body.classList.add('rtl');
  document.documentElement.dir = 'rtl';
  document.documentElement.lang = 'ar';
  document.title = 'رسائل التخرج – المعهد الصحي العالي واسط';
}
renderPage();
loadTheses();
</script>
</body>
</html>
